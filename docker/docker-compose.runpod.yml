# RenderForge — Unified RunPod RTX 4090 Deployment
#
# Single GPU runs all 3 engines with time-sharing:
#   - Fish Speech TTS (2GB VRAM, always resident)
#   - Flux Klein 4B (8GB VRAM, on-demand)
#   - HunyuanVideo 1.5 (14GB VRAM, on-demand, CPU offload)
#
# VRAM budget: Fish Speech(2GB) + Flux(8GB) = 10GB
#              Fish Speech(2GB) + Hunyuan(14GB) = 16GB (with offload)
#
# Monthly cost: ~$50 (RunPod RTX 4090) vs $5,522 with external APIs
#
# Usage:
#   docker compose -f docker/docker-compose.runpod.yml up -d

services:
  renderforge:
    build: ..
    ports: ["3000:3000"]
    depends_on: [redis, chromium]
    environment:
      - GPU_ENABLED=true
      - VOICECORE_ENABLED=true
      - VOICECORE_HOST=voicecore
      - VOICECORE_PORT=8080
      - COMFYUI_HOST=comfyui
      - COMFYUI_PORT=8188
      - HUNYUAN_HOST=hunyuan
      - HUNYUAN_PORT=8190
      - REDIS_URL=redis://redis:6379
      - CHROMIUM_WS=ws://chromium:3000
      - STORAGE_PATH=/data/assets
    volumes:
      - assets:/data/assets

  redis:
    image: redis:7-alpine

  chromium:
    image: browserless/chrome:latest
    environment:
      - MAX_CONCURRENT_SESSIONS=4
      - CONNECTION_TIMEOUT=600000

  voicecore:
    build: docker/voicecore
    ports: ["8080:8080"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - models:/workspace/models
      - references:/workspace/references

  comfyui:
    image: comfyanonymous/comfyui:latest
    ports: ["8188:8188"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - comfyui-models:/workspace/ComfyUI/models

  hunyuan:
    build: docker/hunyuan
    ports: ["8190:8190"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - hunyuan-models:/workspace/models

volumes:
  assets:
  models:
  references:
  comfyui-models:
  hunyuan-models:
